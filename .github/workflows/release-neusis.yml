name: Release Neusis image
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: 'Optional suffix appended to the date-based tag (e.g. "rc1")'
        required: false
        default: ''
permissions:
  contents: write
  packages: write
  id-token: write
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          DATE=$(date +%Y.%m.%d)
          SHA=${GITHUB_SHA::7}
          SUFFIX="${{ github.event.inputs.tag_suffix }}"
          if [ -n "$SUFFIX" ]; then
            NEUSIS_TAG="neusis-v${DATE}-${SHA}-${SUFFIX}"
          else
            NEUSIS_TAG="neusis-v${DATE}-${SHA}"
          fi
          echo "neusis_tag=${NEUSIS_TAG}" >> $GITHUB_OUTPUT
          echo "main_sha_tag=main-${SHA}" >> $GITHUB_OUTPUT

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/neusis-ai-org/attendee:latest
            ghcr.io/neusis-ai-org/attendee:${{ steps.tags.outputs.main_sha_tag }}
            ghcr.io/neusis-ai-org/attendee:${{ steps.tags.outputs.neusis_tag }}
          provenance: true
          sbom: true

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes "ghcr.io/neusis-ai-org/attendee@${{ steps.build.outputs.digest }}"

      - name: Tag git release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "${{ steps.tags.outputs.neusis_tag }}"
          git push origin "${{ steps.tags.outputs.neusis_tag }}"
