# App service account (web, worker, scheduler) — bound to GCP SA via Workload Identity
apiVersion: v1
kind: ServiceAccount
metadata:
  name: attendee-app
  namespace: attendee
  annotations:
    iam.gke.io/gcp-service-account: attendee-app@neusis-platform.iam.gserviceaccount.com
---
# Bot pod service account — bound to GCP SA via Workload Identity
apiVersion: v1
kind: ServiceAccount
metadata:
  name: attendee-bot
  namespace: attendee
  annotations:
    iam.gke.io/gcp-service-account: attendee-bot@neusis-platform.iam.gserviceaccount.com
---
# Webpage streamer service account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: attendee-bot
  namespace: attendee-webpage-streamer
  annotations:
    iam.gke.io/gcp-service-account: attendee-bot@neusis-platform.iam.gserviceaccount.com
